services:
  db:
    image: postgres:16-alpine
    container_name: route_generator_db
    restart: unless-stopped
    ports: 
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - route-network

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npm", "run", "migration:run"]
    env_file: 
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - route-network
    restart: "no"    

  # ----------------------------------------------------
  # 1. API PRINCIPAL (Atiende HTTP y guarda en BD)
  # ----------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: 
      - .env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - RUN_MODE=api
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_POOL_SIZE=10
    depends_on:
      db:
        condition: service_healthy
    networks:
      - route-network
    deploy:
      replicas: 1

  # ----------------------------------------------------
  # 2. WORKER DE PLANIFICACIÓN
  # ----------------------------------------------------
  worker-planning:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: 
      - .env
    command: ["node", "dist/main-worker-planning.js"]
    environment:
      - RUN_MODE=worker-planning
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_POOL_SIZE=5
      - PLANNING_BATCH_SIZE=${PLANNING_BATCH_SIZE:-5}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - route-network
    deploy:
      replicas: 2

  # ----------------------------------------------------
  # 3. WORKER DE DISPATCH
  # ----------------------------------------------------
  worker-dispatch:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: 
      - .env
    command: ["node", "dist/main-worker-dispatch.js"]
    environment:
      - RUN_MODE=worker-dispatch
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_POOL_SIZE=5
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-5}
      - WEBHOOK_TIMEOUT_MS=${WEBHOOK_TIMEOUT_MS:-5000}
      - DISPATCH_BATCH_SIZE=${DISPATCH_BATCH_SIZE:-10}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - route-network
    deploy:
      replicas: 2

volumes:
  pgdata:

networks:
  route-network:
    driver: bridge