services:
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npm", "run", "migration:run"]
    environment:
      - DB_HOST
      - DB_PORT
      - DB_USER
      - DB_PASS
      - DB_NAME
      - PORT
    networks:
      - dokploy-network
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - RUN_MODE=api
      - DB_POOL_SIZE=10
      - DB_HOST
      - DB_PORT
      - DB_USER
      - DB_PASS
      - DB_NAME
      - PORT
      - NODE_ENV=production
    depends_on:
      migrator:
        condition: service_completed_successfully
    networks:
      - dokploy-network
    deploy:
      replicas: 3

  worker-planning:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/main-worker-planning.js"]
    environment:
      - RUN_MODE=worker-planning
      - DB_POOL_SIZE=5
      - PLANNING_BATCH_SIZE=${PLANNING_BATCH_SIZE:-5}
      - DB_HOST
      - DB_PORT
      - DB_USER
      - DB_PASS
      - DB_NAME
      - PORT
      - NODE_ENV=production
    depends_on:
      migrator:
        condition: service_completed_successfully
    networks:
      - dokploy-network
    deploy:
      replicas: 2

  worker-dispatch:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/main-worker-dispatch.js"]
    environment:
      - RUN_MODE=worker-dispatch
      - DB_POOL_SIZE=5
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-5}
      - WEBHOOK_TIMEOUT_MS=${WEBHOOK_TIMEOUT_MS:-5000}
      - DISPATCH_BATCH_SIZE=${DISPATCH_BATCH_SIZE:-10}
      - DB_HOST
      - DB_PORT
      - DB_USER
      - DB_PASS
      - DB_NAME
      - PORT
      - NODE_ENV=production
    depends_on:
      migrator:
        condition: service_completed_successfully
    networks:
      - dokploy-network
    deploy:
      replicas: 2

networks:
  dokploy-network:
    external: true